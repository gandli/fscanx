name: goreleaser

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: "Check out code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: "Set up Go"
        uses: actions/setup-go@v4
        with:
          go-version: '1.20.x'

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true
          version: 'v4.2.4'

      - name: UPX version
        run: upx --version

      - name: "Build binaries (no UPX via goreleaser)"
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: 'v1.26.2'
          args: "build --snapshot --clean -f .github/conf/.goreleaser.yml"
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Compress binaries with UPX manually"
        run: |
          upx -9 --quiet dist/*/fscanx* 2>&1 | tail -20 || true
          echo "=== compressed sizes ==="
          find dist -name 'fscanx*' -exec ls -la {} \;

      - name: "Publish release (skip build)"
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: 'v1.26.2'
          args: "release --skip=build --clean -f .github/conf/.goreleaser.yml"
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
