before:
  hooks:
    - go mod tidy
builds:
  -
    id: default
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    goarm:
      - "6"
      - "7"
    flags:
      - -trimpath
    ldflags:
      - -s -w
upx:
  -
    ids: [ default ]
    enabled: false
    # UPX 5.x (installed by ghaction-upx@v3) rejects options goreleaser v1
    # passes (e.g. `-a`), so compression is disabled. The binaries are
    # larger but the release is faster and reliable on all platforms.
    # Re-enable only after validating a goreleaser v2 + UPX 5.x combo.
archives:
  -
    format: binary
    allow_different_binary_count: true
    name_template: >-
      {{- .ProjectName }}
      {{- if eq .Os "darwin"}}_mac
      {{- else if eq .Os "linux"}}
      {{- else if eq .Os "windows"}}
      {{- else }}_{{ .Os }}{{ end }}
      {{- if eq .Arch "amd64" }}
      {{- else if eq .Arch "386" }}32
      {{- else }}_{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '.*\.md$'
      - '.*\.ya?ml$'
