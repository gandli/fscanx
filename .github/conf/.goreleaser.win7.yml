# Win7-compatible release configuration.
#
# Why this file exists:
#   Go 1.21+ raised the minimum supported Windows version to Windows 10, so
#   binaries built with Go >= 1.21 crash/refuse to run on Windows 7/8/8.1.
#   Go 1.20 is the last toolchain with full Windows 7 runtime support, so the
#   accompanying workflow builds with Go 1.20.x.
#
# Win7-relevant targets:
#   - windows_amd64  (64-bit Win7)
#   - windows_386    (32-bit Win7)
# Linux/macOS targets are kept for a complete release.
before:
  hooks:
    - go mod tidy

builds:
  - id: win7
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - "386"
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

upx:
  - ids: [ win7 ]
    enabled: true
    goos: [ "windows", "linux" ]
    goarch: [ "amd64", "386" ]
    compress: best

archives:
  - format: binary
    allow_different_binary_count: true
    name_template: >-
      {{- .ProjectName }}
      {{- if eq .Os "darwin" }}_mac
      {{- else if eq .Os "linux" }}
      {{- else if eq .Os "windows" }}
      {{- else }}_{{ .Os }}{{ end }}
      {{- if eq .Arch "amd64" }}
      {{- else if eq .Arch "386" }}32
      {{- else }}_{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - "^*.md"
      - "^*.ya?ml"
