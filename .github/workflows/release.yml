name: goreleaser

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: "Check out code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: "Set up Go"
        uses: actions/setup-go@v4
        with:
          go-version: '1.20.x'

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true
          version: 'v4.2.4'

      - name: UPX version
        run: upx --version

      - name: "Build binaries (no UPX via goreleaser)"
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: 'v1.26.2'
          args: "build --snapshot --clean -f .github/conf/.goreleaser.yml"
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Compress binaries with UPX manually"
        run: |
          upx -8 --quiet dist/*/fscanx* 2>&1 | tail -20 || true
          echo "=== compressed sizes ==="
          find dist -name 'fscanx*' -exec ls -la {} \;

      - name: "Flatten and checksum"
        id: pkg
        run: |
          mkdir -p /tmp/artifacts
          # flatten all fscanx binaries into one dir with platform-suffixed names
          for f in $(find dist -type f -name 'fscanx*' ! -name '*.txt'); do
            # derive a readable name from the dist subdir, e.g. default_windows_amd64_v1/fscanx.exe -> fscanx_windows_amd64_v1.exe
            sub=$(dirname "$f" | sed 's#^dist/##; s#^default_##')
            base=$(basename "$f")
            if [ "$sub" != "." ]; then
              name="${base%.*}_${sub}.${base##*.}"
              # if no extension (linux/macos), just append sub
              case "$base" in
                *.*) ;;
                *) name="${base}_${sub}" ;;
              esac
            else
              name="$base"
            fi
            cp "$f" "/tmp/artifacts/$name"
          done
          cd /tmp/artifacts
          sha256sum * > checksums.txt
          ls -la /tmp/artifacts

      - name: "Publish release"
        run: |
          cd /tmp/artifacts
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --repo "${GITHUB_REPOSITORY}" \
            *
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
